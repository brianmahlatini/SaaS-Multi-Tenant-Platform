<section class="panel">
  <div class="panel-heading">
    <h2>API keys</h2>
    @if (session.canManage()) {
      <form [formGroup]="apiKeyForm" (ngSubmit)="createApiKey()" class="inline-form">
        <input type="text" formControlName="name" placeholder="Key name">
        <button type="submit">Create key</button>
      </form>
    }
  </div>

  @if (dashboard.oneTimeKey()) {
    <div class="secret">
      <span>One-time secret</span>
      <code>{{ dashboard.oneTimeKey() }}</code>
    </div>
  }

  <div class="table">
    @for (key of dashboard.apiKeys(); track key.id) {
      <div class="table-row">
        <strong>{{ key.name }}</strong>
        <code>{{ key.prefix }}...</code>
        <span>{{ key.revokedAt ? 'Revoked' : 'Active' }}</span>
        @if (session.canManage()) {
          <button type="button" [disabled]="!!key.revokedAt" (click)="revokeKey(key)">Revoke</button>
        }
      </div>
    }
  </div>
</section>

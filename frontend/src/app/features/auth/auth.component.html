<main class="shell auth-shell">
  <section class="auth-panel">
    <div>
      <p class="eyebrow">Multi-tenant SaaS</p>
      <h1>Run organizations, billing, usage, and access from one cockpit.</h1>
    </div>

    <div class="mode-switch" role="tablist" aria-label="Authentication mode">
      <button type="button" [class.active]="authMode() === 'login'" (click)="authMode.set('login')">Login</button>
      <button type="button" [class.active]="authMode() === 'register'" (click)="authMode.set('register')">Register</button>
    </div>

    @if (authMode() === 'login') {
      <form [formGroup]="loginForm" (ngSubmit)="login()" class="form-grid">
        <label>Email<input type="email" formControlName="email" autocomplete="email"></label>
        <label>Password<input type="password" formControlName="password" autocomplete="current-password"></label>
        <button type="submit" [disabled]="session.loading()">Sign in</button>
      </form>
    } @else {
      <form [formGroup]="registerForm" (ngSubmit)="register()" class="form-grid">
        <label>Name<input type="text" formControlName="fullName" autocomplete="name"></label>
        <label>Email<input type="email" formControlName="email" autocomplete="email"></label>
        <label>Password<input type="password" formControlName="password" autocomplete="new-password"></label>
        <label>Organization<input type="text" formControlName="organizationName"></label>
        <button type="submit" [disabled]="session.loading()">Create workspace</button>
      </form>
    }

    @if (session.message()) {
      <p class="notice">{{ session.message() }}</p>
    }
  </section>
</main>
